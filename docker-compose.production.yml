services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-8080}:8080"
    environment:
      APP_ENV: production
      PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in the deployment environment}
      DB_NAME: ${DB_NAME:-tenant_saas}
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET:?Set a long random JWT_SECRET in the deployment environment}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-24}

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in the deployment environment}
      POSTGRES_DB: ${DB_NAME:-tenant_saas}
    volumes:
      - tenant_saas_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  tenant_saas_data:
